services:
  postgres:
    image: postgres:16-alpine
    container_name: fluentpath-postgres
    environment:
      POSTGRES_DB: fluentpath
      POSTGRES_USER: fluentpath
      POSTGRES_PASSWORD: fluentpath_dev
    ports:
      - "5432:5432"
    volumes:
      - fluentpath_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluentpath -d fluentpath"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fluentpath_postgres_data:
